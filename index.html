<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DAN'S TUNER - FORCED AVERAGE SANDBOX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #ffffff; color: #000000; display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden; padding: 8px; 
    max-width: 500px; margin: 0 auto;
  }

  #startOverlay {
    position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex;
    flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;
  }
  #startOverlay h1 { font-size: 2.2rem; color: #ff0000; font-weight: 900; font-style: italic; margin-bottom: 20px; line-height: 1.1;}
  #bigStartBtn {
    background: transparent; color: #fff; background: #000; font-size: 2rem; font-weight: 900;
    padding: 15px 40px; border-radius: 8px; cursor: pointer; border: none; box-shadow: 0 6px 0px #333;
  }
  #bigStartBtn:active { transform: translateY(4px); box-shadow: 0 2px 0px #333; }

  .header { text-align: center; margin-bottom: 8px; }
  h1 { color: #ff0000; font-size: 1.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; }
  .subtitle { font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 2px; }

  .controls-row { display: flex; gap: 4px; justify-content: center; background: #f0f0f0; padding: 6px; border-radius: 6px; border: 2px solid #000; margin-bottom: 8px;}
  .top-btn { 
    background: #fff; border: 2px solid #000; font-size: 0.9rem; font-weight: 900; padding: 8px 12px; 
    cursor: pointer; border-radius: 4px; text-transform: uppercase; flex: 1; text-align: center;
  }
  #btnPause { background: #00aa00; color: #fff; border-color: #007700; }

  .iv-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap;}
  .iv-tab { 
    flex: 1 1 18%; padding: 8px 0; text-align: center; font-size: 0.75rem; 
    background: #ffffff; border: 2px solid #000; cursor: pointer; border-radius: 4px; font-weight: 800;
  }
  .iv-tab.on { background: #000000; color: #ffffff; }

  .roll-wrapper { display: flex; align-items: center; gap: 4px; background: #f4f4f4; border: 2px solid #000; border-radius: 4px; padding: 4px; margin-bottom: 8px; }
  .roll-nav { background: #e0e0e0; border: 1px solid #000; border-radius: 3px; width: 40px; height: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
  .roll-nav:active { background: #000; color: #fff; }
  .piano-roll { display: flex; flex: 1; justify-content: space-between; }
  .pk {
    flex: 1; height: 60px; background: #ffffff; border: 1px solid #000000; border-radius: 0 0 3px 3px; margin: 0 1px; 
    display: flex; flex-direction: column; justify-content: flex-end; align-items: center; font-size: 0.75rem; 
    font-weight: 700; padding-bottom: 6px; cursor: pointer;
  }
  .pk.sh { background: #000000; color: #ffffff; height: 40px; }
  .pk.on { border: 3px solid #ff0000 !important; z-index: 2; position: relative; }
  .pk.disabled { opacity: 0.3; background: #ccc !important; }

  .readout-box {
    border: 4px solid #000; border-radius: 8px; padding: 15px 10px; margin-bottom: 8px;
    text-align: center; background: #f0f0f0; position: relative;
  }
  .val-large { font-size: 4rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em; transition: color 0.1s; }
  .val-lbl { font-size: 1rem; text-transform: uppercase; font-weight: 900; color: #000; margin-top: 4px; }
  
  #signalLight { position: absolute; top: 15px; left: 15px; width: 16px; height: 16px; border-radius: 50%; background: #e0e0e0; border: 2px solid #000; }
  #captureStateLbl { position: absolute; top: 15px; right: 15px; font-size: 0.85rem; font-weight: 900; color: #666; }
  #ivInfo { position: absolute; bottom: 10px; left: 15px; font-size: 0.8rem; font-weight: bold; color: #444; }
  #targetBps { position: absolute; bottom: 10px; right: 15px; font-size: 0.8rem; font-weight: bold; color: #444; }

  .workspace { flex: 1; border: 2px solid #000; border-radius: 6px; background: #ffffff; display: flex; flex-direction: column; overflow: hidden;}
  table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; }
  th { position: sticky; top: 0; background: #000; color: #fff; padding: 8px 4px; font-weight: 700; text-transform: uppercase; }
  td { padding: 8px 4px; border-bottom: 1px solid #e0e0e0; font-weight: 600; }
  .log-container { flex: 1; overflow-y: auto; }
  .btn-clear { background: #ffeaea; border: 1px solid #d00000; color: #d00000; padding: 8px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 0; }
  
</style>
</head>
<body>

<div id="startOverlay">
  <h1>FORCED AVG SANDBOX</h1>
  <p style="margin-bottom:20px; font-weight:bold; padding: 0 20px;">Features instant Green lock for clean strings, and Orange fallback average for messy strings.</p>
  <button id="bigStartBtn">START ENGINE</button>
</div>

<div class="header">
  <h1>DBSD</h1>
  <div class="subtitle">Fallback Average Sandbox</div>
</div>

<div class="controls-row">
  <button class="top-btn" id="btnPause">MIC: ON</button>
</div>

<div class="iv-tabs" id="ivTabs">
  <button class="iv-tab on" data-iv="M3">M3</button>
  <button class="iv-tab" data-iv="M6">M6</button>
  <button class="iv-tab" data-iv="P4">P4</button>
  <button class="iv-tab" data-iv="P5">P5</button>
  <button class="iv-tab" data-iv="M10">M10</button>
</div>

<div class="roll-wrapper">
  <button class="roll-nav" id="octDown">‹</button>
  <div class="piano-roll" id="pianoRoll"></div>
  <button class="roll-nav" id="octUp">›</button>
</div>

<div class="readout-box">
  <div id="signalLight"></div>
  <div id="captureStateLbl">READY</div>
  <div id="ivInfo">F3 - A3</div>
  <div class="val-large" id="avgVal">—</div>
  <div class="val-lbl">MEASURED BPS</div>
  <div id="targetBps">Target: ~6.93</div>
</div>

<div class="workspace">
  <div class="log-container">
    <table>
      <thead><tr><th>Interval</th><th>Note</th><th>Measured</th><th>Target</th></tr></thead>
      <tbody id="logBody"><tr><td colspan="4" style="color:#888; padding: 20px;">Logs will appear here instantly upon lock.</td></tr></tbody>
    </table>
  </div>
  <button class="btn-clear" onclick="clearLogs()">CLEAR ALL LOGS</button>
</div>

<script>
let audioCtx, micStream, analyserFull, gainNode, scriptNode, filters = [];
let isRunning = false, micPaused = false, currentChunkSize = 256, rafId = null; 
let noiseFloor = 0.001, envelopeRunning = 0, lastEnvelope = 0, envHistory = [];    

let transientSamplesLeft = 0, lastAttackTime = 0;
const TRANSIENT_DELAY_MS = 250; 
let transientLockout = 0;

let captureState = 'IDLE', captureStartTime = 0, capturedBeats = [], lockedAverage = null;
let lastAudioFrameTime = 0; 

let curIv = 'M3', lowerMidi = 53, rollBaseMidi = 53;
let loggedIntervals = { M3: [], M6: [], P4: [], P5: [], M10: [] };

let tuningCurve = new Float32Array(109);
for(let m=21; m<=108; m++) tuningCurve[m] = 440 * Math.pow(2, (m - 69) / 12);

const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_SHARP = new Set([1,3,6,8,10]);
const noteName = m => NOTES[m % 12] + (Math.floor(m / 12) - 1);

const IV = {
  M3:  { sem:4,  lp:5, up:4 }, 
  M6:  { sem:9,  lp:5, up:3 }, 
  P4:  { sem:5,  lp:4, up:3 }, 
  P5:  { sem:7,  lp:3, up:2 }, 
  M10: { sem:16, lp:5, up:2 }
};

Object.keys(IV).forEach(key => {
  let min = 108, max = 21;
  for (let m = 21; m <= 108; m++) {
    if (m + IV[key].sem > 108) continue;
    let fLo = 440 * Math.pow(2, (m - 69) / 12); 
    let fHi = 440 * Math.pow(2, (m + IV[key].sem - 69) / 12);
    let beat = Math.abs(IV[key].up * fHi - IV[key].lp * fLo);
    if (beat >= 0.15 && beat <= 25.0) { 
      if (m < min) min = m; if (m > max) max = m; 
    }
  }
  IV[key].min = min; IV[key].max = max;
});

const $ = id => document.getElementById(id);
const avgEl = $('avgVal'), sigLight = $('signalLight'), stateLbl = $('captureStateLbl');

async function startAudioEngine() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 1 } });
        micStream = stream;
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const src = audioCtx.createMediaStreamSource(micStream);
        
        analyserFull = audioCtx.createAnalyser(); 
        analyserFull.fftSize = 4096; 
        
        const cfg = getConfig(lowerMidi, curIv); filters = buildFilters(cfg);
        gainNode = audioCtx.createGain(); gainNode.gain.value = 250.0; 
        scriptNode = audioCtx.createScriptProcessor(1024, 1, 1);

        src.connect(analyserFull); src.connect(filters[0]); filters[0].connect(filters[1]); 
        filters[1].connect(gainNode); gainNode.connect(scriptNode); scriptNode.connect(audioCtx.destination);

        scriptNode.onaudioprocess = buildAudioProcessor();
        isRunning = true; 
        lastAudioFrameTime = performance.now(); 
        
        if(rafId) cancelAnimationFrame(rafId);
        lastEnvelope = 0; rafId = requestAnimationFrame(renderLoop);
    } catch (e) {
        alert("Microphone access denied or failed.");
    }
}

function getConfig(lowerMidi, ivKey) {
  const iv = IV[ivKey]; const upperMidi = lowerMidi + iv.sem; 
  const fLo = tuningCurve[lowerMidi]; const fHi = tuningCurve[upperMidi];
  const pLo = iv.lp * fLo; const pHi = iv.up * fHi; 
  const center = (pLo + pHi) / 2; const theoBeat = Math.abs(pHi - pLo);
  
  let margin = Math.max(22, theoBeat * 1.2 + 8); 
  if (ivKey === 'M10') margin *= 3.0; 
  
  return { lowerMidi, upperMidi, center, theoBeat, bpLo: center - margin, bpHi: center + margin, iv, ivKey };
}

function buildFilters(cfg) { 
    const Q = (cfg.center / (cfg.bpHi - cfg.bpLo)) * 0.75; 
    const f1 = audioCtx.createBiquadFilter(); f1.type = 'bandpass'; f1.frequency.value = cfg.center; f1.Q.value = Q; 
    const f2 = audioCtx.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = cfg.center; f2.Q.value = Q; 
    return [f1, f2]; 
}

function retuneFilters(cfg) { 
    if (!audioCtx || filters.length === 0) return; 
    const Q = (cfg.center / (cfg.bpHi - cfg.bpLo)) * 0.75; 
    filters[0].frequency.value = cfg.center; filters[0].Q.value = Q; 
    filters[1].frequency.value = cfg.center; filters[1].Q.value = Q; 
}

function resetCapture() { 
    captureState = 'IDLE'; capturedBeats = []; lockedAverage = null; 
    if (!micPaused) { stateLbl.textContent = 'READY'; stateLbl.style.color = '#666'; } 
    avgEl.textContent = '—'; avgEl.style.color = '#000';
}

function buildPianoRoll() {
  const roll = $('pianoRoll'); const ivDef = IV[curIv]; roll.innerHTML = '';
  for (let m = rollBaseMidi; m < rollBaseMidi + 12; m++) {
    const key = document.createElement('div'); const isSharp = IS_SHARP.has(m % 12);
    key.className = 'pk' + (isSharp ? ' sh' : ''); key.dataset.midi = m;
    if (m >= ivDef.min && m <= ivDef.max) { 
        key.textContent = noteName(m); 
        key.addEventListener('click', () => { lowerMidi = m; resetCapture(); refreshUI(); }); 
    } else { 
        key.classList.add('disabled'); 
        if (!isSharp) key.textContent = noteName(m); 
    }
    roll.appendChild(key);
  }
  refreshUI();
}

function refreshUI() {
  const cfg = getConfig(lowerMidi, curIv);
  document.querySelectorAll('.pk').forEach(k => { let m = parseInt(k.dataset.midi); k.classList.toggle('on', m === cfg.lowerMidi); });
  $('ivInfo').textContent = `${noteName(cfg.lowerMidi)} - ${noteName(cfg.upperMidi)}`;
  $('targetBps').textContent = `Target: ~${cfg.theoBeat.toFixed(2)}`;
  retuneFilters(cfg);
}

// Added 'isForced' flag to alter table color
function finalizeLog(isForced = false) {
  if (lockedAverage === null) return; 
  const cfg = getConfig(lowerMidi, curIv); 
  let entry = loggedIntervals[curIv].find(x => x.midi === lowerMidi);
  if (!entry) { 
      entry = { midi: lowerMidi, noteName: noteName(lowerMidi), target: cfg.theoBeat }; 
      loggedIntervals[curIv].push(entry); 
  }
  entry.measured = lockedAverage;
  entry.isForced = isForced;
  renderLogTable();
}

function renderLogTable() {
  const tb = $('logBody'); tb.innerHTML = ''; let entries = loggedIntervals[curIv] || [];
  if (entries.length > 0) {
    entries.sort((a, b) => a.midi - b.midi);
    for (let i = entries.length - 1; i >= 0; i--) {
      const c = entries[i];
      let color = c.isForced ? '#ff9900' : '#00aa00'; // Orange if forced, Green if clean
      tb.innerHTML += `<tr><td><b>${curIv}</b></td><td>${c.noteName}</td><td style="font-weight:900; color:${color};">${c.measured.toFixed(2)}</td><td style="color:#888;">~${c.target.toFixed(2)}</td></tr>`;
    }
  } else { tb.innerHTML = '<tr><td colspan="4" style="color:#888; padding: 20px;">Logs will appear here instantly upon lock.</td></tr>'; }
}

window.clearLogs = function() {
    loggedIntervals = { M3: [], M6: [], P4: [], P5: [], M10: [] };
    resetCapture();
    renderLogTable();
}

function buildAudioProcessor() {
  return (e) => {
    if (!isRunning || micPaused) return; const inputData = e.inputBuffer.getChannelData(0);
    lastAudioFrameTime = performance.now(); 

    for (let offset = 0; offset < inputData.length; offset += currentChunkSize) {
      let sum = 0, limit = Math.min(currentChunkSize, inputData.length - offset); 
      for (let i = 0; i < limit; i++) sum += inputData[offset + i] * inputData[offset + i];
      const rms = Math.sqrt(sum / limit); 
      
      envelopeRunning = (envelopeRunning * 0.7) + (rms * 0.3); 
      const isStrike = (envelopeRunning > lastEnvelope * 1.5) && (envelopeRunning > 0.002); 
      lastEnvelope = envelopeRunning;
      
      if (isStrike) transientLockout = performance.now() + TRANSIENT_DELAY_MS;
      
      noiseFloor = noiseFloor * 0.996 + Math.min(envelopeRunning, noiseFloor * 1.5) * 0.004; 
      if (noiseFloor < 0.000001) noiseFloor = 0.000001; 
      const snr = envelopeRunning / noiseFloor;
      
      if (isStrike && snr > 1.8) { 
          const timeNow = performance.now(); 
          if (timeNow - lastAttackTime > 250) { 
              envHistory = []; lastAttackTime = timeNow; transientSamplesLeft = 8;
              captureState = 'WAIT'; captureStartTime = timeNow; capturedBeats = []; 
              stateLbl.textContent = 'ATTACK...'; stateLbl.style.color = '#ff9900'; 
              avgEl.style.color = '#000';
          } 
      }
      if (transientSamplesLeft > 0) { transientSamplesLeft--; } 
      else { 
          envHistory.push({ val: envelopeRunning }); 
          const fps = audioCtx.sampleRate / currentChunkSize; 
          if (envHistory.length > Math.round(3.0 * fps)) envHistory.shift(); 
      }
    }
  };
}

// THE FORCED AVERAGE FALLBACK
function forceAverageLock() {
    // 1. Sort the collected beats
    let sorted = [...capturedBeats].sort((a, b) => a - b);
    
    // 2. Trim the highest and lowest 20% to toss out chaotic false beat readings
    let trimCount = Math.floor(sorted.length * 0.2);
    let middleChunk = sorted.slice(trimCount, sorted.length - trimCount);
    
    if (middleChunk.length === 0) middleChunk = sorted; // Saftey check
    
    // 3. Average the remaining middle values
    let sum = middleChunk.reduce((a, b) => a + b, 0);
    lockedAverage = sum / middleChunk.length;
    
    // 4. Update UI (Flagged as Orange/Warning)
    avgEl.textContent = lockedAverage.toFixed(2);
    avgEl.style.color = '#ff9900'; 
    stateLbl.textContent = 'FORCED LOCK'; 
    stateLbl.style.color = '#ff9900'; 
    captureState = 'LOCKED'; 
    
    // Pass true to flag as forced
    finalizeLog(true); 
}

function renderLoop() {
  if (!isRunning) return; rafId = requestAnimationFrame(renderLoop); if (micPaused) return;
  
  const snr = envelopeRunning / noiseFloor; 
  let minEnv = 0.002, minSnr = 1.8;
  if (lowerMidi > 60) { minEnv *= 0.5; minSnr *= 0.5; }

  if (snr > minSnr && envelopeRunning > minEnv) sigLight.style.background = '#00ff00'; 
  else sigLight.style.background = '#e0e0e0'; 
  
  let now = performance.now(); 
  const fps = audioCtx.sampleRate / currentChunkSize; 
  let minHistFrames = Math.round(fps * 0.3);
  
  if (captureState === 'WAIT' && now - captureStartTime > 200) { 
      captureState = 'CAPTURING'; stateLbl.textContent = 'TRACKING...'; stateLbl.style.color = '#0066ff'; 
  }
  
  if (captureState === 'CAPTURING') {
      if (envHistory.length >= minHistFrames && snr > minSnr && envelopeRunning > minEnv) { 
          let beat = detectBeat(envHistory, curIv); 
          if (beat !== null) { 
              capturedBeats.push(beat); 
              
              // Keep a massive rolling window for the forced average fallback
              if (capturedBeats.length > 25) capturedBeats.shift();

              // LIVE DISPLAY (Updates constantly using a smaller recent window)
              let liveWindow = capturedBeats.slice(-8);
              let sortedLive = [...liveWindow].sort((a,b)=>a-b);
              let currentMedian = sortedLive[Math.floor(sortedLive.length/2)];

              avgEl.textContent = currentMedian.toFixed(2);
              avgEl.style.color = '#0066ff'; // Blue indicates it is tracking live

              // IDEAL INSTANT LOCK LOGIC (Clean strings only)
              if (capturedBeats.length >= 6) {
                  let recentBeats = capturedBeats.slice(-5);
                  recentBeats.sort((a,b) => a-b); 
                  let windowSpread = recentBeats[recentBeats.length-1] - recentBeats[0];
                  
                  if (windowSpread <= 0.6) { 
                      lockedAverage = recentBeats[Math.floor(recentBeats.length/2)]; 
                      avgEl.textContent = lockedAverage.toFixed(2); 
                      avgEl.style.color = '#00aa00'; // Turn Green
                      stateLbl.textContent = 'LOCKED!'; stateLbl.style.color = '#00aa00'; 
                      captureState = 'LOCKED'; 
                      finalizeLog(false); // Clean lock
                  }
              }
          } 
      }
      
      // FALLBACK LOGIC: If 4.5 seconds pass and we never hit the ideal lock...
      if (now - captureStartTime > 4500) {
          if (capturedBeats.length >= 6) { // Make sure we actually heard enough data
              forceAverageLock();
          } else {
              captureState = 'IDLE'; stateLbl.textContent = 'NO BEAT'; stateLbl.style.color = '#d00000'; 
              avgEl.style.color = '#ccc';
              setTimeout(() => { if(!micPaused && captureState==='IDLE') resetCapture(); }, 1000); 
          }
      } 
      // Fast abort if string dies quickly
      else if (now - captureStartTime > 1500 && snr < minSnr * 0.5) {
          captureState = 'IDLE'; stateLbl.textContent = 'SIGNAL LOST'; stateLbl.style.color = '#d00000'; 
          avgEl.style.color = '#ccc';
          setTimeout(() => { if(!micPaused && captureState==='IDLE') resetCapture(); }, 1000); 
      }
  }
}

function detectBeat(history, ivKey) {
  const N = history.length; const fps = audioCtx.sampleRate / currentChunkSize; const vals = history.map(h => h.val); const windowSize = Math.round(fps * 0.45); const valAvg = vals.reduce((a,b) => a+b, 0) / N;
  const AC = new Float32Array(N); for (let i = 0; i < N; i++) { let start = Math.max(0, i - Math.floor(windowSize / 2)), end = Math.min(N, i + Math.ceil(windowSize / 2)), localSum = 0; for (let j = start; j < end; j++) localSum += vals[j]; AC[i] = vals[i] - (localSum / (end - start)); }
  let ac0 = 0; for (let i = 0; i < N; i++) ac0 += AC[i] * AC[i]; let beatIntensity = Math.sqrt(ac0 / N) / valAvg; if (beatIntensity < 0.008 && valAvg > 0.002) return 0.0; if (ac0 < 1e-12) return null;
  const minLag = Math.max(2, Math.round(fps / 55)), maxLag = Math.min(N - 2, Math.round(fps / 0.2)); const ac = new Float32Array(maxLag + 1); for (let lag = minLag; lag <= maxLag; lag++) { let sum = 0; for (let i = 0; i < N - lag; i++) sum += AC[i] * AC[i + lag]; ac[lag] = sum / ac0; }
  
  const peaks = []; let acThreshold = 0.01; 
  if (ivKey === 'M10') acThreshold = 0.008; if (ivKey === 'P4' || ivKey === 'P5') acThreshold = 0.005;
  for (let lag = minLag + 1; lag < maxLag; lag++) { if (ac[lag] > ac[lag - 1] && ac[lag] > ac[lag + 1] && ac[lag] > acThreshold) peaks.push({ lag, ac: ac[lag] }); }
  if (peaks.length === 0) return null;
  
  let bestCandidate = null, maxScore = -1;
  peaks.forEach(p => {
    let alpha = ac[p.lag - 1], beta = ac[p.lag], gamma = ac[p.lag + 1]; let denom = alpha - 2 * beta + gamma; let pLag = p.lag;
    if (Math.abs(denom) > 1e-5) pLag = p.lag + 0.5 * (alpha - gamma) / denom; let rate = fps / pLag; 
    
    if (rate < 0.2 || rate > 25.0) return; 
    
    if (p.ac > maxScore) { maxScore = p.ac; bestCandidate = rate; }
  }); 
  return maxScore > 0.005 ? bestCandidate : null;
}

// UI Setup
$('bigStartBtn').addEventListener('click', async () => { 
    $('startOverlay').style.display = 'none'; 
    await startAudioEngine(); 
});

$('btnPause').onclick = async () => {
  micPaused = !micPaused;
  if (micPaused) { 
      $('btnPause').textContent = 'MIC: PAUSED'; $('btnPause').style.background = '#ff0000'; $('btnPause').style.borderColor = '#990000'; 
      stateLbl.textContent = 'PAUSED'; captureState = 'IDLE'; 
      if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      isRunning = false;
  } else { 
      $('btnPause').textContent = 'MIC: ON'; $('btnPause').style.background = '#00aa00'; $('btnPause').style.borderColor = '#007700'; 
      resetCapture(); await startAudioEngine(); 
  }
};

document.querySelectorAll('.iv-tab').forEach(t => { 
  t.addEventListener('click', () => { 
    curIv = t.dataset.iv;
    document.querySelectorAll('.iv-tab').forEach(x => x.classList.remove('on')); t.classList.add('on'); 
    while (lowerMidi < IV[curIv].min) lowerMidi++; while (lowerMidi > IV[curIv].max) lowerMidi--;
    while (lowerMidi < rollBaseMidi) rollBaseMidi -= 12; while (lowerMidi >= rollBaseMidi + 12) rollBaseMidi += 12;
    resetCapture(); buildPianoRoll(); renderLogTable();
  }); 
});

$('octDown').addEventListener('click', () => { if (rollBaseMidi > 12) { rollBaseMidi -= 12; buildPianoRoll(); } }); 
$('octUp').addEventListener('click', () => { if (rollBaseMidi < 108) { rollBaseMidi += 12; buildPianoRoll(); } });
